<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Eckstein = cornerstone: a bold diamond/cube mark in navy+gold -->
  <!-- Outer diamond outline in gold -->
  <polygon points="16,2 30,16 16,30 2,16" stroke="#c9a84c" stroke-width="1.5" fill="none"/>
  <!-- Inner solid diamond in navy -->
  <polygon points="16,7 25,16 16,25 7,16" fill="#05101f"/>
  <!-- Centered 'E' letterform cut out of navy in gold -->
  <line x1="12" y1="12" x2="12" y2="20" stroke="#c9a84c" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="12" y1="12" x2="19" y2="12" stroke="#c9a84c" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="12" y1="16" x2="18" y2="16" stroke="#c9a84c" stroke-width="1.25" stroke-linecap="round"/>
  <line x1="12" y1="20" x2="19" y2="20" stroke="#c9a84c" stroke-width="1.5" stroke-linecap="round"/>
</svg>
